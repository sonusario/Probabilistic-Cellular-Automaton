<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Probabilistic Cellular Automaton</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0f1217;
            --panel: #171b22;
            --soft: #141820;
            --text: #f7f8fb;
            --muted: #aeb8c6;
            --border: #303947;
            --track: #2a3340;
            --btn: #26303d;
            --btn2: #344254;
            --orange: #FF9A00;
            --blue: #2f83ff;
            --dead: #15151d
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top, rgba(255, 154, 0, .08), transparent 28rem), linear-gradient(#111821, #0f1217 55%);
            color: var(--text)
        }

        .app {
            width: min(100%, 1280px);
            margin: auto;
            display: grid;
            gap: 12px
        }

        header {
            text-align: center;
            display: grid;
            gap: 4px
        }

        h1 {
            margin: 0;
            font-size: clamp(1.45rem, 1rem + 2vw, 2.25rem)
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: .92rem
        }

        .topbar,
        .settings,
        .rule-panel,
        .stats {
            background: rgba(23, 27, 34, .92);
            border: 1px solid #242c38;
            border-radius: 12px;
            box-shadow: 0 10px 34px rgba(0, 0, 0, .24)
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px
        }

        .btn,
        select {
            border: 1px solid var(--border);
            background: var(--btn);
            color: var(--text);
            min-height: 36px;
            border-radius: 8px;
            padding: 8px 12px;
            font-weight: 700;
            cursor: pointer
        }

        .btn:hover,
        select:hover {
            background: var(--btn2)
        }

        #startStop.running {
            background: #d86d00;
            border-color: #ffab3d;
            color: #101010
        }

        .check {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: #d9e1ea;
            font-size: .9rem;
            min-height: 36px
        }

        .check input {
            accent-color: var(--orange)
        }

        .settings {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            padding: 10px
        }

        .setting-row {
            display: grid;
            grid-template-columns: minmax(7.4rem, 1fr) minmax(90px, 1.2fr) 4.2rem;
            align-items: center;
            gap: 8px;
            color: #d9e1ea;
            font-size: .88rem
        }

        .setting-row label {
            white-space: nowrap
        }

        .num,
        .prob-num {
            border: 1px solid var(--border);
            background: #11161d;
            color: var(--text);
            border-radius: 7px;
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-weight: 700
        }

        .num {
            width: 100%;
            padding: 6px 7px
        }

        .prob-num {
            width: 3.05rem;
            padding: 4px 5px;
            font-size: .82rem
        }

        .main {
            display: grid;
            gap: 12px;
            align-items: start;
            grid-template-areas: "canvas" "survival" "birth"
        }

        .canvas-panel {
            grid-area: canvas;
            display: grid;
            gap: 10px;
            justify-items: center;
            min-width: 0
        }

        .survival-panel {
            grid-area: survival
        }

        .birth-panel {
            grid-area: birth
        }

        .rule-panel {
            padding: 10px
        }

        .panel-title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px
        }

        .panel-title h2 {
            margin: 0;
            font-size: 1rem
        }

        .panel-title span {
            color: var(--muted);
            font-size: .72rem;
            white-space: nowrap
        }

        .surv {
            color: var(--orange)
        }

        .born {
            color: #75adff
        }

        .rules {
            display: grid;
            gap: 4px
        }

        .rule-row {
            display: grid;
            grid-template-columns: 1.45rem minmax(72px, 1fr) 3.05rem;
            align-items: center;
            gap: 7px;
            min-height: 28px
        }

        .nlabel {
            text-align: right;
            color: #d9e1ea;
            font-size: .78rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums
        }

        .nlabel:after {
            content: "n";
            color: var(--muted);
            font-weight: 500;
            margin-left: 1px
        }

        .rng,
        .prob-rng {
            --accent: var(--orange);
            --fill: 0%;
            width: 100%;
            height: 22px;
            margin: 0;
            appearance: none;
            background: transparent;
            cursor: pointer
        }

        .rng.birth,
        .prob-rng.birth {
            --accent: var(--blue)
        }

        .rng::-webkit-slider-runnable-track,
        .prob-rng::-webkit-slider-runnable-track {
            height: 6px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent) 0 var(--fill), var(--track) var(--fill) 100%);
            border: 1px solid rgba(255, 255, 255, .08)
        }

        .rng::-moz-range-track,
        .prob-rng::-moz-range-track {
            height: 6px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent) 0 var(--fill), var(--track) var(--fill) 100%);
            border: 1px solid rgba(255, 255, 255, .08)
        }

        .rng::-webkit-slider-thumb,
        .prob-rng::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            margin-top: -6px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid #f8fbff;
            box-shadow: 0 1px 7px #0008
        }

        .rng::-moz-range-thumb,
        .prob-rng::-moz-range-thumb {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid #f8fbff;
            box-shadow: 0 1px 7px #0008
        }

        canvas {
            width: min(700px, 100%);
            height: auto;
            aspect-ratio: 7/5;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--dead);
            box-shadow: 0 12px 38px rgba(0, 0, 0, .36);
            cursor: crosshair;
            touch-action: none;
            image-rendering: pixelated
        }

        .stats {
            width: min(700px, 100%);
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1px;
            overflow: hidden
        }

        .stat {
            background: rgba(20, 24, 32, .95);
            padding: 8px 10px;
            display: grid;
            gap: 2px
        }

        .stat span {
            color: var(--muted);
            font-size: .72rem;
            text-transform: uppercase;
            letter-spacing: .06em
        }

        .stat output {
            min-width: 10ch;
            text-align: right;
            justify-self: end;
            font: 600 .96rem ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-variant-numeric: tabular-nums
        }

        .summary {
            width: min(700px, 100%);
            color: var(--muted);
            text-align: center;
            font-size: .84rem;
            line-height: 1.35
        }

        .help {
            margin: 0;
            color: var(--muted);
            text-align: center;
            font-size: .82rem;
            line-height: 1.4
        }

        @media(min-width:1060px) {
            .main {
                grid-template-columns: minmax(190px, 240px) minmax(560px, 700px) minmax(190px, 240px);
                grid-template-areas: "survival canvas birth";
                justify-content: center
            }

            .rule-panel {
                position: sticky;
                top: 12px
            }

            .rule-row {
                grid-template-columns: 1.35rem minmax(82px, 1fr) 2.85rem;
                gap: 6px
            }

            .prob-num {
                width: 2.85rem;
                padding-inline: 4px
            }
        }

        @media(min-width:720px) and (max-width:1059px) {
            .main {
                grid-template-columns: 1fr 1fr;
                grid-template-areas: "canvas canvas" "survival birth"
            }
        }

        @media(max-width:560px) {
            body {
                padding: 10px
            }

            .settings {
                grid-template-columns: 1fr
            }

            .setting-row {
                grid-template-columns: 1fr;
                gap: 5px
            }

            .num {
                max-width: 6rem
            }

            .stats {
                grid-template-columns: 1fr
            }

            .stat {
                grid-template-columns: 1fr auto;
                align-items: center
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <header>
            <h1>Probabilistic Cellular Automaton</h1>
            <p class="subtitle">Separate survival and birth probability rules, visualized directly on the grid.</p>
        </header>
        <section class="topbar" aria-label="Simulation controls">
            <button class="btn" id="startStop">Start</button><button class="btn" id="step">Step</button><button
                class="btn" id="random">Randomize</button><button class="btn" id="clear">Clear</button>
            <label class="check"><input id="wrap" type="checkbox" checked>Wrap edges</label>
            <label class="check">Preset <select id="preset">
                    <option value="conway">Conway B3/S23</option>
                    <option value="highlife">HighLife B36/S23</option>
                    <option value="seeds">Seeds B2/S</option>
                    <option value="dayNight">Day &amp; Night B3678/S34678</option>
                    <option value="custom">Custom</option>
                </select></label>
        </section>
        <section class="settings">
            <div class="setting-row"><label for="speedR">Speed delay (ms)</label><input class="rng" id="speedR"
                    type="range" min="16" max="1000" value="100"><input class="num" id="speedN" type="number" min="16"
                    max="1000" value="100"></div>
            <div class="setting-row"><label for="densityR">Random density (%)</label><input class="rng birth"
                    id="densityR" type="range" min="0" max="100" value="30"><input class="num" id="densityN"
                    type="number" min="0" max="100" value="30"></div>
            <div class="setting-row"><label for="cellR">Cell size (px)</label><input class="rng" id="cellR" type="range"
                    min="1" max="10" value="10"><input class="num" id="cellN" type="number" min="1" max="10" value="10">
            </div>
        </section>
        <section class="main">
            <aside class="rule-panel survival-panel">
                <div class="panel-title">
                    <h2 class="surv">Survival</h2><span>live → live</span>
                </div>
                <div class="rules" id="survivalRules"></div>
            </aside>
            <section class="canvas-panel"><canvas id="life" width="700" height="500"
                    aria-label="Interactive cellular automaton grid"></canvas>
                <div class="stats">
                    <div class="stat"><span>Generation</span><output id="gen">0</output></div>
                    <div class="stat"><span>Live cells</span><output id="live">0</output></div>
                    <div class="stat"><span>Grid</span><output id="gridStat">70×50</output></div>
                </div>
                <div class="summary" id="summary"></div>
                <p class="help">Click or drag to paint cells. Space toggles play/pause. S steps, R randomizes and
                    starts, C clears.</p>
            </section>
            <aside class="rule-panel birth-panel">
                <div class="panel-title">
                    <h2 class="born">Birth</h2><span>dead → live</span>
                </div>
                <div class="rules" id="birthRules"></div>
            </aside>
        </section>
    </main>
    <script>
        'use strict';
        const W = 700, H = 500, DEAD = '#15151d', ORANGE = '#FF9A00', BLUE_DARK = '#0E2E63', WHITE = '#ffffff';
        const $ = id => document.getElementById(id), canvas = $('life'), ctx = canvas.getContext('2d', { alpha: false });
        const startBtn = $('startStop'), stepBtn = $('step'), randBtn = $('random'), clearBtn = $('clear'), wrap = $('wrap'), preset = $('preset');
        const genEl = $('gen'), liveEl = $('live'), gridEl = $('gridStat'), summary = $('summary');
        const presets = { conway: { s: [0, 0, 100, 100, 0, 0, 0, 0, 0], b: [0, 0, 0, 100, 0, 0, 0, 0, 0] }, highlife: { s: [0, 0, 100, 100, 0, 0, 0, 0, 0], b: [0, 0, 0, 100, 0, 0, 100, 0, 0] }, seeds: { s: [0, 0, 0, 0, 0, 0, 0, 0, 0], b: [0, 0, 100, 0, 0, 0, 0, 0, 0] }, dayNight: { s: [0, 0, 0, 100, 100, 0, 100, 100, 100], b: [0, 0, 0, 100, 0, 0, 100, 100, 100] } };
        const rule = { s: presets.conway.s.slice(), b: presets.conway.b.slice() }, ctrl = { s: [], b: [] };
        let delay = 100, density = 30, cell = 10, rows = Math.ceil(H / cell), cols = Math.ceil(W / cell), grid = new Uint8Array(rows * cols), next = new Uint8Array(rows * cols), counts = new Uint8Array(rows * cols), countsDirty = true, gen = 0, live = 0, running = false, raf = null, last = 0, renderQueued = false, painting = false, paintValue = 1, lastPaint = -1;
        const livePal = palette(ORANGE, WHITE), deadPal = palette(DEAD, BLUE_DARK);
        function clamp(v, min, max) { v = Number(v); return Number.isFinite(v) ? Math.min(max, Math.max(min, Math.round(v))) : min }
        function fmt(n) { return Number(n).toLocaleString('en-US') }
        function rgb(hex) { hex = hex.replace('#', ''); return { r: parseInt(hex.slice(0, 2), 16), g: parseInt(hex.slice(2, 4), 16), b: parseInt(hex.slice(4, 6), 16) } }
        function palette(a, b) { a = rgb(a); b = rgb(b); return Array.from({ length: 101 }, (_, i) => { let t = i / 100; return { r: Math.round(a.r + (b.r - a.r) * t), g: Math.round(a.g + (b.g - a.g) * t), b: Math.round(a.b + (b.b - a.b) * t) } }) }
        function fillRange(input) { let min = Number(input.min || 0), max = Number(input.max || 100), v = clamp(input.value, min, max), p = max === min ? 0 : (v - min) / (max - min) * 100; input.style.setProperty('--fill', p + '%') }
        function sync(num, rng, min, max, fn) { function commit(src) { let v = clamp(src.value, min, max); num.value = v; rng.value = v; fillRange(rng); fn(v) } num.addEventListener('input', () => commit(num)); num.addEventListener('change', () => commit(num)); rng.addEventListener('input', () => commit(rng)); rng.addEventListener('change', () => commit(rng)); commit(num) }
        function buildRules(kind, el) { for (let n = 0; n < 9; n++) { let row = document.createElement('div'), lab = document.createElement('label'), rng = document.createElement('input'), num = document.createElement('input'); row.className = 'rule-row'; lab.className = 'nlabel'; lab.textContent = n; lab.htmlFor = `${kind}${n}n`; lab.title = n + ' neighbors'; rng.type = 'range'; rng.min = 0; rng.max = 100; rng.value = rule[kind][n]; rng.className = 'prob-rng ' + (kind === 'b' ? 'birth' : ''); rng.id = `${kind}${n}r`; rng.ariaLabel = (kind === 's' ? 'survival' : 'birth') + ` probability with ${n} neighbors`; num.type = 'number'; num.min = 0; num.max = 100; num.value = rule[kind][n]; num.className = 'prob-num'; num.id = `${kind}${n}n`; num.inputMode = 'numeric'; num.ariaLabel = rng.ariaLabel; row.append(lab, rng, num); el.append(row); ctrl[kind][n] = { num, rng }; sync(num, rng, 0, 100, v => { rule[kind][n] = v; preset.value = 'custom'; updateSummary(); queueRender() }) } }
        function setRule(kind, n, v) { v = clamp(v, 0, 100); rule[kind][n] = v; ctrl[kind][n].num.value = v; ctrl[kind][n].rng.value = v; fillRange(ctrl[kind][n].rng) }
        function applyPreset(name) { let p = presets[name]; if (!p) return; for (let n = 0; n < 9; n++) { setRule('s', n, p.s[n]); setRule('b', n, p.b[n]) } preset.value = name; updateSummary(); queueRender() }
        function summaryPart(vals) { let yes = [], maybe = []; vals.forEach((v, i) => { if (v === 100) yes.push(i); else if (v > 0) maybe.push(`${i}:${v}%`) }); return yes.length || maybe.length ? [yes.join(''), maybe.join(', ')].filter(Boolean).join(' + ') : 'none' }
        function updateSummary() { summary.innerHTML = `Rule: <span class="born">B ${summaryPart(rule.b)}</span> / <span class="surv">S ${summaryPart(rule.s)}</span>` }
        function resizeGrid(newCell, resample = true) { let old = grid, or = rows, oc = cols; cell = clamp(newCell, 1, 10); rows = Math.ceil(H / cell); cols = Math.ceil(W / cell); let g = new Uint8Array(rows * cols); if (resample && old && or && oc) { for (let r = 0; r < rows; r++) { let rr = Math.min(or - 1, Math.floor(((r + .5) / rows) * or)), no = r * cols, oo = rr * oc; for (let c = 0; c < cols; c++) { let cc = Math.min(oc - 1, Math.floor(((c + .5) / cols) * oc)); g[no + c] = old[oo + cc] } } } grid = g; next = new Uint8Array(rows * cols); counts = new Uint8Array(rows * cols); countsDirty = true; updateStats(); queueRender() }
        function updateStats() { genEl.value = fmt(gen); liveEl.value = fmt(live); gridEl.value = `${cols}×${rows}` }
        function randomize() { live = 0; for (let i = 0; i < grid.length; i++) { let a = Math.random() * 100 < density ? 1 : 0; grid[i] = a; live += a } gen = 0; countsDirty = true; last = 0; render(); start() }
        function clearGrid() { grid.fill(0); gen = 0; live = 0; countsDirty = true; stop(); render() }
        function computeCounts() { if (!countsDirty) return; let w = wrap.checked; for (let r = 0; r < rows; r++) { let ro = r * cols, up = r === 0 ? (w ? rows - 1 : -1) : r - 1, dn = r === rows - 1 ? (w ? 0 : -1) : r + 1, uo = up >= 0 ? up * cols : -1, doff = dn >= 0 ? dn * cols : -1; for (let c = 0; c < cols; c++) { let l = c === 0 ? (w ? cols - 1 : -1) : c - 1, ri = c === cols - 1 ? (w ? 0 : -1) : c + 1, n = 0; if (uo >= 0) { if (l >= 0) n += grid[uo + l]; n += grid[uo + c]; if (ri >= 0) n += grid[uo + ri] } if (l >= 0) n += grid[ro + l]; if (ri >= 0) n += grid[ro + ri]; if (doff >= 0) { if (l >= 0) n += grid[doff + l]; n += grid[doff + c]; if (ri >= 0) n += grid[doff + ri] } counts[ro + c] = n } } countsDirty = false }
        function step() { computeCounts(); let nl = 0; for (let i = 0; i < grid.length; i++) { let p = grid[i] ? rule.s[counts[i]] : rule.b[counts[i]], a = Math.random() * 100 < p ? 1 : 0; next[i] = a; nl += a } let tmp = grid; grid = next; next = tmp; live = nl; gen++; countsDirty = true }
        function render() { renderQueued = false; computeCounts(); let img = ctx.createImageData(W, H), data = img.data, lc = 0; for (let r = 0; r < rows; r++) { let y0 = r * cell, y1 = Math.min(H, y0 + cell), ro = r * cols; for (let c = 0; c < cols; c++) { let x0 = c * cell, x1 = Math.min(W, x0 + cell), i = ro + c, alive = grid[i], p = alive ? rule.s[counts[i]] : rule.b[counts[i]], col = alive ? livePal[p] : deadPal[p]; lc += alive; for (let y = y0; y < y1; y++) { let px = (y * W + x0) * 4; for (let x = x0; x < x1; x++) { data[px] = col.r; data[px + 1] = col.g; data[px + 2] = col.b; data[px + 3] = 255; px += 4 } } } } live = lc; ctx.putImageData(img, 0, 0); updateStats() }
        function queueRender() { if (renderQueued) return; renderQueued = true; requestAnimationFrame(render) }
        function start() { if (running) return; running = true; last = 0; startBtn.textContent = 'Pause'; startBtn.classList.add('running'); raf = requestAnimationFrame(loop) }
        function stop() { running = false; startBtn.textContent = 'Start'; startBtn.classList.remove('running'); if (raf !== null) { cancelAnimationFrame(raf); raf = null } }
        function loop(t) { if (!running) return; if (last === 0 || t - last >= delay) { step(); render(); last = t } raf = requestAnimationFrame(loop) }
        function pointerIndex(e) { let rect = canvas.getBoundingClientRect(), x = (e.clientX - rect.left) * (W / rect.width), y = (e.clientY - rect.top) * (H / rect.height), c = Math.floor(x / cell), r = Math.floor(y / cell); return r < 0 || r >= rows || c < 0 || c >= cols ? -1 : r * cols + c }
        function paint(i) { if (i < 0 || i === lastPaint) return; lastPaint = i; if (grid[i] !== paintValue) { grid[i] = paintValue; countsDirty = true; queueRender() } }
        startBtn.onclick = () => running ? stop() : start();
        stepBtn.onclick = () => { stop(); step(); render() };
        randBtn.onclick = randomize; clearBtn.onclick = clearGrid; wrap.onchange = () => { countsDirty = true; queueRender() }; preset.onchange = () => { if (preset.value !== 'custom') applyPreset(preset.value) };
        canvas.addEventListener('pointerdown', e => { let i = pointerIndex(e); if (i < 0) return; e.preventDefault(); canvas.setPointerCapture(e.pointerId); painting = true; paintValue = grid[i] ? 0 : 1; lastPaint = -1; paint(i) });
        canvas.addEventListener('pointermove', e => { if (!painting) return; e.preventDefault(); paint(pointerIndex(e)) });
        function endPaint(e) { if (painting && canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId); painting = false; lastPaint = -1 } canvas.addEventListener('pointerup', endPaint); canvas.addEventListener('pointercancel', endPaint);
        window.addEventListener('keydown', e => { let t = document.activeElement && document.activeElement.tagName; if (['INPUT', 'SELECT', 'TEXTAREA'].includes(t)) return; if (e.code === 'Space') { e.preventDefault(); startBtn.click() } else if (e.key === 's' || e.key === 'S') stepBtn.click(); else if (e.key === 'r' || e.key === 'R') randBtn.click(); else if (e.key === 'c' || e.key === 'C') clearBtn.click() });
        buildRules('s', $('survivalRules')); buildRules('b', $('birthRules'));
        sync($('speedN'), $('speedR'), 16, 1000, v => delay = v); sync($('densityN'), $('densityR'), 0, 100, v => density = v); sync($('cellN'), $('cellR'), 1, 10, v => resizeGrid(v, true));
        applyPreset('conway'); randomize(); stop();
    </script>
</body>
